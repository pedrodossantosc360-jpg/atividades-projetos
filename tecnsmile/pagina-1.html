<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tecnosmile</title>
   
    <style>:root {
  --primary: #4f46e5; /* indigo */
  --secondary: #22c55e; /* green */
  --bg: #f9fafb;
  --text: #111827;
  --muted: #6b7280;
  --radius: 16px;
  --shadow: 0 10px 25px rgba(0,0,0,.08);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(180deg, #eef2ff, var(--bg));
  color: var(--text);
  min-height: 100vh;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 2rem;
}

.card {
  background: #fff;
  border-radius: var(--radius);
  padding: 2rem;
  box-shadow: var(--shadow);
  transition: transform .3s ease, box-shadow .3s ease;
}

.card:hover {
  transform: translateY(-6px);
  box-shadow: 0 20px 40px rgba(0,0,0,.12);
}

h1, h2, h3 {
  font-weight: 700;
  letter-spacing: -0.02em;
}

h1 {
  font-size: 2.2rem;
}

p {
  color: var(--muted);
  line-height: 1.6;
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: .5rem;
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: 999px;
  padding: .75rem 1.5rem;
  font-weight: 600;
  cursor: pointer;
  transition: background .3s ease, transform .2s ease;
}

.btn:hover {
  background: #4338ca;
  transform: scale(1.05);
}

.btn.secondary {
  background: var(--secondary);
}

input, textarea {
  width: 100%;
  padding: .75rem 1rem;
  border-radius: 12px;
  border: 1px solid #e5e7eb;
  font-size: 1rem;
  outline: none;
  transition: border .3s ease, box-shadow .3s ease;
}

input:focus, textarea:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(79,70,229,.2);
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 1.5rem;
}

footer {
  text-align: center;
  padding: 2rem;
  color: var(--muted);
  font-size: .9rem;
}

/* ===== BANNER MODERNO ===== */

.banner {
  position: relative;
  width: 100%;
  min-height: 320px;
  border-radius: var(--radius);
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, rgba(79,70,229,.9), rgba(34,197,94,.85));
  box-shadow: var(--shadow);
}

.banner img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: brightness(.85) contrast(1.1) saturate(1.15);
  transform: scale(1.05);
}

.banner::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(0,0,0,.15), rgba(0,0,0,.55));
}

.banner-content {
  position: relative;
  z-index: 2;
  text-align: center;
  color: #fff;
  padding: 2rem;
  max-width: 700px;
}

.banner-content h1 {
  font-size: clamp(1.8rem, 4vw, 3rem);
  margin-bottom: .75rem;
}

.banner-content p {
  color: #e5e7eb;
  font-size: 1.1rem;
  margin-bottom: 1.5rem;
}

.banner-content .btn {
  background: #fff;
  color: var(--primary);
}

.banner-content .btn:hover {
  background: #e5e7eb;
}

/* Responsividade */
@media (max-width: 640px) {
  .banner {
    min-height: 260px;
  }

  .banner-content {
    padding: 1.5rem;
  }
}


/* ===== MELHORIA VISUAL PARA TELA DE CADASTRO / LOGIN ===== */

.page {
  display: grid;
  grid-template-columns: 280px 1fr;
  min-height: 100vh;
}

.sidebar {
  background: linear-gradient(180deg, #111827, #1f2933);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem;
}

.sidebar img {
  max-width: 180px;
}

.main {
  display: flex;
  align-items: center;
  justify-content: center;
  background: radial-gradient(circle at top, #1e3a8a, #020617);
}

.form-box {
  background: rgba(255,255,255,.08);
  backdrop-filter: blur(14px);
  border-radius: 20px;
  padding: 2.5rem;
  width: 100%;
  max-width: 420px;
  box-shadow: 0 25px 60px rgba(0,0,0,.4);
}

.form-box h1 {
  text-align: center;
  color: #fff;
  margin-bottom: .5rem;
}

.form-box p {
  text-align: center;
  font-size: .95rem;
  margin-bottom: 2rem;
}

.form-group {
  margin-bottom: 1.2rem;
}

.form-group label {
  display: block;
  margin-bottom: .3rem;
  font-size: .85rem;
  color: #c7d2fe;
}

.form-group input {
  background: rgba(255,255,255,.12);
  border: 1px solid rgba(255,255,255,.2);
  color: #fff;
}

.form-group input::placeholder {
  color: #cbd5f5;
}

.form-group input:focus {
  box-shadow: 0 0 0 3px rgba(99,102,241,.4);
}

.form-box .btn {
  width: 100%;
  margin-top: .5rem;
}

.link {
  display: block;
  text-align: center;
  margin-top: 1rem;
  color: #a5b4fc;
  font-size: .9rem;
}

.link:hover {
  text-decoration: underline;
}

@media (max-width: 768px) {
  .page {
    grid-template-columns: 1fr;
  }

  .sidebar {
    display: none;
  }
}
    </style>
</head>
