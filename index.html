<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TecnSmile</title>
    <link rel="stylesheet" href="smile.css">
    <style>
    /* === PERFIL DO USUÁRIO === */
    :root {
  --primary: #4f46e5; /* indigo */
  --secondary: #22c55e; /* green */
  --bg: #f9fafb;
  --text: #111827;
  --muted: #6b7280;
  --radius: 16px;
  --shadow: 0 10px 25px rgba(0,0,0,.08);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(180deg, #eef2ff, var(--bg));
  color: var(--text);
  min-height: 100vh;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 2rem;
}

.card {
  background: #fff;
  border-radius: var(--radius);
  padding: 2rem;
  box-shadow: var(--shadow);
  transition: transform .3s ease, box-shadow .3s ease;
}

.card:hover {
  transform: translateY(-6px);
  box-shadow: 0 20px 40px rgba(0,0,0,.12);
}

h1, h2, h3 {
  font-weight: 700;
  letter-spacing: -0.02em;
}

h1 {
  font-size: 2.2rem;
}

p {
  color: var(--muted);
  line-height: 1.6;
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: .5rem;
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: 999px;
  padding: .75rem 1.5rem;
  font-weight: 600;
  cursor: pointer;
  transition: background .3s ease, transform .2s ease;
}

.btn:hover {
  background: #4338ca;
  transform: scale(1.05);
}

.btn.secondary {
  background: var(--secondary);
}

input, textarea {
  width: 100%;
  padding: .75rem 1rem;
  border-radius: 12px;
  border: 1px solid #e5e7eb;
  font-size: 1rem;
  outline: none;
  transition: border .3s ease, box-shadow .3s ease;
}

input:focus, textarea:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(79,70,229,.2);
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 1.5rem;
}

footer {
  text-align: center;
  padding: 2rem;
  color: var(--muted);
  font-size: .9rem;
}
.perfil {
    background-color: #111; /* escuro para combinar com nav */
    color: aliceblue;
    width: 400px;
    max-width: 90%;
    margin: 20px auto;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 2px 3px 10px rgba(33, 3, 73, 0.7);
    text-align: center;
}

.perfil img {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 3px solid rgb(0, 255, 0);
    object-fit: cover;
}

.perfil h2 {
    margin-top: 10px;
    color: rgb(0, 255, 0);
}

.perfil p {
    color: aliceblue;
    margin: 5px 0;
}

.perfil button {
    margin-top: 15px;
    padding: 10px 20px;
    background-color: rgb(0, 255, 0);
    color: blue;
    border-radius: 10px 14px 0px 12px;
    box-shadow: 2px 3px 5px 1px rgb(33, 3, 73);
    cursor: pointer;
}

.perfil button:hover {
    background-color: rgb(39, 255, 39);
    transition: 0.3s;
}

/* === FORMULÁRIO DE EDIÇÃO === */
.form-edicao {
    display: none;
    background-color: #111;
    color: aliceblue;
    width: 400px;
    max-width: 90%;
    margin: 20px auto;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 2px 3px 10px rgba(33, 3, 73, 0.7);
    text-align: left;
}

.form-edicao label {
    display: block;
    margin-top: 10px;
    font-weight: bold;
    color: rgb(0, 255, 0);
}

.form-edicao input {
    width: 95%;
    padding: 8px;
    margin-top: 5px;
    border-radius: 8px;
    border: 1px solid #aaa;
    background-color: #222;
    color: white;
}

.form-edicao button {
    margin-top: 15px;
    padding: 10px 20px;
    border: none;
    background-color: rgb(0, 255, 0);
    color: blue;
    border-radius: 10px 14px 0px 12px;
    box-shadow: 2px 3px 5px 1px rgb(33, 3, 73);
    cursor: pointer;
}

.form-edicao button:hover {
    background-color: rgb(39, 255, 39);
    transition: 0.3s;
}

/* === INFORMAÇÕES === */
.info {
    margin-top: 30px;
    font-size: 1.1em;
    color: aliceblue;
    text-align: center;
}

/* === CHATBOT === */
.chatbot {
    width: 90%;
    max-width: 600px;
    margin: 30px auto;
    text-align: center;
}

.chatbot h3 {
    color: #007acc;
    margin-bottom: 10px;
}

.chat-container {
    display: flex;
    flex-direction: column;
    height: 400px;
    border-radius: 15px;
    box-shadow: 2px 3px 10px rgba(33,3,73,0.3);
    overflow: hidden;
    background-color: #f0f8ff;
}

.chat-messages {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
}

.chat-input {
    display: flex;
    border-top: 1px solid #ccc;
}

.chat-input input {
    flex: 1;
    padding: 10px;
    border: none;
    font-size: 16px;
}

.chat-input button {
    background-color: rgb(0, 255, 0);
    color: blue;
    border: none;
    padding: 0 20px;
    cursor: pointer;
    font-weight: bold;
}

.message {
    margin-bottom: 10px;
    display: flex;
    flex-direction: column;
}

.message.user {
    align-items: flex-end;
}

.message.user .text {
    background-color: rgb(0, 255, 0);
    color: blue;
    padding: 8px 12px;
    border-radius: 10px 10px 0 10px;
    max-width: 70%;
}

.message.bot .text {
    background-color: #007acc;
    color: white;
    padding: 8px 12px;
    border-radius: 10px 10px 10px 0;
    max-width: 70%;
}

/* === RESPONSIVO === */
@media screen and (max-width: 500px) {
    .perfil, .form-edicao, .chatbot {
        width: 95%;
        padding: 15px;
    }

    .perfil img {
        width: 100px;
        height: 100px;
    }
}</style>

</head>

<body>
    <header>
        
        <header><img src="imagens/smileimage.jpg" alt="" id="logo4" align="left">  
        <nav align="center">
            
            <a href="pagina de consulta.html">  <input type="button" value="consultas" align="center" id="bp"></a>
           <a href="paginasmileprincipal.html"> <input type="button" value="inicio"align="center"id="bp"></a>
           <a href="pagina de inicio.html"> <input type="button" value="perfil"align="center"id="bp"></a>
         <a href="chatbot.html">   <input type="button" value="central de ajuda"id="bp" ></a>
        </nav>
    </header>
    </header>

    <main>
        <h1 id="times"></h1>

        <!-- PERFIL -->
        <section class="perfil" id="perfil">
            <img src="imagens/foto.jpeg" alt="Foto do usuário" id="fotoPerfil">
            <h2 id="nomeUsuario"></h2>
            <p><strong>E-mail:</strong> <span id="emailUsuario">pedrohenrique@email.com</span></p>
            <p><strong>Telefone:</strong> <span id="telefoneUsuario">(11) 99999-9999</span></p>
            <p><strong>Plano atual:</strong> <span id="planoUsuario">Smile Premium</span></p>
            <button onclick="abrirFormulario()">Editar Perfil</button>
        </section>

        <!-- FORMULÁRIO DE EDIÇÃO -->
        <section class="form-edicao" id="formEdicao">
            <h3>Editar Perfil</h3>
            <label for="nome">Nome:</label>
            <input type="text" id="nome" placeholder="Digite seu nome">

            <label for="email">E-mail:</label>
            <input type="email" id="email" placeholder="Digite seu e-mail">

            <label for="telefone">Telefone:</label>
            <input type="text" id="telefone" placeholder="Digite seu telefone">

            <label for="plano">Plano:</label>
            <input type="text" id="plano" placeholder="Ex: Smile Premium">

            <button onclick="salvarPerfil()">Salvar</button>
            <button onclick="cancelarEdicao()" style="background-color: gray;">Cancelar</button>
        </section>

        <!-- INFORMAÇÕES -->
        <div class="info">
            <p>Consultas realizadas: 0</p>
            <p>Histórico: Nenhum</p>
            <p>Pagamentos pendentes: 0</p>
        </div>
    </main>

    >
    <script>
        var nome=window.prompt(' por motivos de segurança qual é seu primeiro nome?');
const agora = new Date();
const horas = String(agora.getHours()).padStart(2, "0");
const minutos = String(agora.getMinutes()).padStart(2, "0");
document.getElementById("times").textContent = `ola ${nome} seja bem vindo ${horas}:${minutos}`;

        function abrirFormulario() {
            document.getElementById("perfil").style.display = "none";
            document.getElementById("formEdicao").style.display = "block";

            // Preenche o formulário com os dados atuais
            document.getElementById("nomeUsuario").value = document.getElementById("nomeUsuario").textContent;
            document.getElementById("email").value = document.getElementById("emailUsuario").textContent;
            document.getElementById("telefone").value = document.getElementById("telefoneUsuario").textContent;
            document.getElementById("plano").value = document.getElementById("planoUsuario").textContent;
        }

        function salvarPerfil() {
            // Atualiza os dados no perfil
            document.getElementById("nomeUsuario").textContent = document.getElementById("nome").value;
            document.getElementById("emailUsuario").textContent = document.getElementById("email").value;
            document.getElementById("telefoneUsuario").textContent = document.getElementById("telefone").value;
            document.getElementById("planoUsuario").textContent = document.getElementById("plano").value;

            // Mostra o perfil novamente
            document.getElementById("formEdicao").style.display = "none";
            document.getElementById("perfil").style.display = "block";

            alert("Perfil atualizado com sucesso!");
        }

        function cancelarEdicao() {
            document.getElementById("formEdicao").style.display = "none";
            document.getElementById("perfil").style.display = "block";
        }
    </script>
</body>
</html>
